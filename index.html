<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Sheet — Track & Solve</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0c0e;
    --panel:#141518;
    --panel-2:#1b1d21;
    --border:#2a2c31;
    --text:#eceae4;
    --text-dim:#96959c;
    --accent:#ff9d4d;
    --accent-dim:#8a5a33;
    --teal:#7dd3c0;
    --easy:#5fbf82;
    --medium:#e8b23d;
    --hard:#e2685f;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:'Space Grotesk',system-ui,sans-serif;}
  code,pre,.mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;}
  ::selection{background:var(--accent-dim);}

  #app{max-width:960px;margin:0 auto;padding:32px 20px 80px;}

  /* ---------- Header ---------- */
  .top{
    display:flex;align-items:baseline;justify-content:space-between;
    margin-bottom:36px;flex-wrap:wrap;gap:8px;
  }
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand .mark{
    width:10px;height:10px;border-radius:2px;background:var(--accent);
    display:inline-block;transform:translateY(-2px);
  }
  .brand h1{font-size:22px;margin:0;font-weight:600;letter-spacing:-0.01em;}
  .top p{color:var(--text-dim);font-size:13px;margin:4px 0 0;}

  /* ---------- Home: topic rail ---------- */
  .rail{position:relative;padding-left:28px;}
  .rail::before{
    content:"";position:absolute;left:9px;top:14px;bottom:14px;width:1px;
    background:linear-gradient(var(--border), var(--border) 90%, transparent);
  }
  .topic-card{
    position:relative;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px 18px;
    margin-bottom:10px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    transition:border-color .15s ease, transform .15s ease;
  }
  .topic-card:hover{border-color:#3a3d44;transform:translateX(2px);}
  .topic-card::before{
    content:attr(data-idx);
    position:absolute;left:-28px;top:50%;transform:translateY(-50%);
    width:20px;height:20px;border-radius:50%;
    background:var(--bg);border:1px solid var(--border);
    font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);
    display:flex;align-items:center;justify-content:center;
  }
  .topic-card.has-data::before{border-color:var(--accent);color:var(--accent);}
  .topic-main .name{font-size:15px;font-weight:500;}
  .topic-main .meta{font-size:12px;color:var(--text-dim);margin-top:4px;}
  .topic-main .meta.ready{color:var(--teal);}
  .chev{color:var(--text-dim);font-size:18px;flex-shrink:0;}

  /* ---------- Topic view ---------- */
  .subhead{
    position:sticky;top:0;background:var(--bg);padding:10px 0 16px;z-index:5;
    border-bottom:1px solid var(--border);margin-bottom:20px;
  }
  .back-btn{
    background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;
    display:flex;align-items:center;gap:6px;padding:0;margin-bottom:10px;font-family:'Inter';
  }
  .back-btn:hover{color:var(--text);}
  .subhead h2{font-size:20px;margin:0 0 12px;font-weight:600;}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .chip{
    border:1px solid var(--border);background:var(--panel);color:var(--text-dim);
    font-size:12px;padding:6px 12px;border-radius:20px;cursor:pointer;
    font-family:'Inter';transition:all .15s ease;
  }
  .chip.active{border-color:var(--accent);color:var(--accent);background:rgba(255,157,77,.08);}
  .chip:hover:not(.active){border-color:#3a3d44;color:var(--text);}
  .search{
    margin-left:auto;background:var(--panel);border:1px solid var(--border);
    border-radius:20px;padding:6px 12px;font-size:12px;color:var(--text);
    min-width:180px;font-family:'Inter';
  }
  .search:focus{outline:none;border-color:var(--teal);}

  .section-title{
    font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);
    margin:26px 0 10px;font-weight:600;
  }
  .section-title:first-child{margin-top:0;}

  .q-row{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    margin-bottom:8px;overflow:hidden;
  }
  .q-head{
    display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;
  }
  .q-head:hover{background:var(--panel-2);}
  .q-name{flex:1;font-size:14px;}
  .badge{
    font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;
    text-transform:uppercase;letter-spacing:.03em;flex-shrink:0;
  }
  .lc-tag{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--teal);
    background:rgba(125,211,192,.1);border:1px solid rgba(125,211,192,.25);
    padding:2px 7px;border-radius:5px;flex-shrink:0;white-space:nowrap;
  }
  .badge-easy{color:var(--easy);background:rgba(95,191,130,.12);}
  .badge-medium{color:var(--medium);background:rgba(232,178,61,.12);}
  .badge-hard{color:var(--hard);background:rgba(226,104,95,.12);}
  .q-arrow{color:var(--text-dim);font-size:12px;transition:transform .15s ease;flex-shrink:0;}
  .q-row.open .q-arrow{transform:rotate(90deg);}

  .q-body{border-top:1px solid var(--border);padding:16px;display:none;}
  .q-row.open .q-body{display:block;}

  .approach-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .a-tab{
    border:1px solid var(--border);background:var(--bg);color:var(--text-dim);
    font-size:11.5px;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:'Inter';
  }
  .a-tab.active{border-color:var(--accent);color:var(--accent);}
  .a-tab .tag{color:var(--teal);font-family:'JetBrains Mono';font-size:10.5px;}
  .a-tab.active .tag{color:var(--accent);}

  .code-wrap{position:relative;}
  .code-topic{font-size:11px;color:var(--text-dim);margin-bottom:6px;}
  .code-topic b{color:var(--teal);font-weight:500;}
  pre.code-block{
    background:#0e0f11;border:1px solid var(--border);border-radius:8px;
    padding:14px 16px;overflow-x:auto;font-size:12.5px;line-height:1.6;margin:0;
  }
  .copy-btn{
    position:absolute;top:10px;right:10px;background:var(--panel-2);border:1px solid var(--border);
    color:var(--text-dim);font-size:10.5px;padding:4px 9px;border-radius:5px;cursor:pointer;font-family:'Inter';
  }
  .copy-btn:hover{color:var(--text);}
  .note{font-size:12px;color:var(--text-dim);margin-top:10px;}

  .kw{color:#c586c0;} .tp{color:#4ec9b0;} .str{color:#ce9178;} .num{color:#b5cea8;} .cm{color:#6a9955;} .fn{color:#dcdcaa;}

  .empty-state{
    border:1px dashed var(--border);border-radius:var(--radius);padding:30px 20px;
    text-align:center;color:var(--text-dim);font-size:13px;
  }
  .no-results{color:var(--text-dim);font-size:13px;padding:20px 0;}

  @media (max-width:560px){
    .search{margin-left:0;width:100%;}
    .subhead h2{font-size:18px;}
  }
</style>
</head>

`void mergeNoSpace(vector<int>& a, vector<int>& b){
    int n = a.size(), m = b.size();

        int i = 0, j = gap;
        while(j < n + m){
            int ai = (i < n) ? a[i] : b[i - n];

`pair<int,int> findRepeatingMissing(vector<int>& arr){

int matrixMedian(vector<vector<int>>& mat){

    for(auto& row : mat){ lo = min(lo, row[0]); hi = max(hi, row[m - 1]); }

    while(lo < hi){

`class LRUCache {
    int capacity;
    list<pair<int,int>> order; // {key, value}, front = most recently used
    unordered_map<int, list<pair<int,int>>::iterator> mp;
public:
    LRUCache(int cap) : capacity(cap) {}
    int get(int key){
        if(mp.find(key) == mp.end()) return -1;
        auto it = mp[key];
        int val = it->second;
        order.erase(it);
        order.push_front({key, val});
        mp[key] = order.begin();
        return val;
    }
    void put(int key, int value){
        if(mp.find(key) != mp.end()) order.erase(mp[key]);
        else if((int)order.size() == capacity){
            auto last = order.back();
            mp.erase(last.first);
            order.pop_back();
        }
        order.push_front({key, value});
        mp[key] = order.begin();
    }
};

`class LFUCache {
    int capacity, minFreq;
    unordered_map<int,int> keyToVal, keyToFreq;
    unordered_map<int, list<int>> freqToKeys;
    unordered_map<int, list<int>::iterator> keyToIter;
    void touch(int key){
        int freq = keyToFreq[key];
        freqToKeys[freq].erase(keyToIter[key]);
        if(freqToKeys[freq].empty() && minFreq == freq) minFreq++;
        keyToFreq[key] = freq + 1;
        freqToKeys[freq + 1].push_front(key);
        keyToIter[key] = freqToKeys[freq + 1].begin();
    }
public:
    LFUCache(int cap) : capacity(cap), minFreq(0) {}
    int get(int key){
        if(keyToVal.find(key) == keyToVal.end()) return -1;
        touch(key);
        return keyToVal[key];
    }
    void put(int key, int value){
        if(capacity == 0) return;
        if(keyToVal.count(key)){ keyToVal[key] = value; touch(key); return; }
        if((int)keyToVal.size() == capacity){
            int evict = freqToKeys[minFreq].back();
            freqToKeys[minFreq].pop_back();
            keyToVal.erase(evict); keyToFreq.erase(evict); keyToIter.erase(evict);
        }
        keyToVal[key] = value;
        keyToFreq[key] = 1;
        freqToKeys[1].push_front(key);
        keyToIter[key] = freqToKeys[1].begin();

`string minWindow(string s, string t){
    int n = s.size(), m = t.size();
    int bestLen = INT_MAX, bestStart = -1;
    int i = 0;
    while(i < n){
        int j = 0, start = i;
        while(i < n){                  // expand until t is fully matched
            if(s[i] == t[j]){ j++; if(j == m) break; }
            i++;
        }
        if(j < m) break;               // t can't be matched again, stop
        int end = i;
        j = m - 1;
        while(i >= start){             // contract from the match backward
            if(s[i] == t[j]){ j--; if(j < 0) break; }
            i--;
        }
        i++;                           // i is now the start of this valid window
        if(end - i + 1 < bestLen){ bestLen = end - i + 1; bestStart = i; }
        i++;                           // move on to search for the next window
    }
    return bestStart == -1 ? "" : s.substr(bestStart, bestLen);
}

/* ======================= STATE ======================= */
let state = { view:'home', topicId:null, filter:'All', query:'', openQ:null, tab:{} };

/* ======================= HELPERS ======================= */
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function highlightCpp(code){
  let html = esc(code);
  html = html.replace(/(\/\/.*$)/gm, '§CM§$1§\/CM§');
  html = html.replace(/("(?:[^"\\]|\\.)*")/g, '§STR§$1§\/STR§');
  html = html.replace(/('(?:[^'\\]|\\.)*')/g, '§STR§$1§\/STR§');
  const kw = ['if','else','for','while','return','break','continue','struct','class','void','true','false','const','static','function','new'];
  const tp = ['int','long','double','float','bool','char','string','auto','vector','stack','queue','unordered_map','unordered_set','map','set','pair'];
  html = html.replace(/\b([A-Za-z_]\w*)\b/g, (m)=>{
    if(kw.includes(m)) return '§KW§'+m+'§\/KW§';
    if(tp.includes(m)) return '§TP§'+m+'§\/TP§';
    return m;
  });
  html = html.replace(/\b(\d+)\b/g, '§NUM§$1§\/NUM§');
  html = html
    .replace(/§CM§/g,'<span class="cm">').replace(/§\/CM§/g,'</span>')
    .replace(/§STR§/g,'<span class="str">').replace(/§\/STR§/g,'</span>')
    .replace(/§KW§/g,'<span class="kw">').replace(/§\/KW§/g,'</span>')
    .replace(/§TP§/g,'<span class="tp">').replace(/§\/TP§/g,'</span>')
    .replace(/§NUM§/g,'<span class="num">').replace(/§\/NUM§/g,'</span>');
  return html;
}

function diffBadge(d){
  const cls = d === 'Easy' ? 'badge-easy' : d === 'Medium' ? 'badge-medium' : 'badge-hard';
  return `<span class="badge ${cls}">${d}</span>`;
}

function countAll(topic){
  let n = 0;
  topic.sections.forEach(s => n += s.questions.length);
  return n;
}

/* ======================= RENDER ======================= */
function render(){
  const app = document.getElementById('app');
  if(state.view === 'home') app.innerHTML = renderHome();
  else app.innerHTML = renderTopic();
  attachHandlers();
}

function renderHome(){
  const cards = TOPICS.map((t, i) => {
    const mapped = countAll(t);
    const hasData = mapped > 0;
    const meta = hasData
      ? `${mapped} of ${t.total} problems mapped with C++ solutions`
      : `${t.total} problems in this topic — not added yet`;
    return `
      <div class="topic-card ${hasData ? 'has-data' : ''}" data-idx="${String(i+1).padStart(2,'0')}" data-topic="${t.id}">
        <div class="topic-main">
          <div class="name">${esc(t.title)}</div>
          <div class="meta ${hasData ? 'ready' : ''}">${meta}</div>
        </div>
        <div class="chev">→</div>
      </div>`;
  }).join('');

  return `
    <div class="top">
      <div class="brand"><span class="mark"></span><h1>DSA Sheet</h1></div>
      <p>Pick a topic, then a question — the optimal interview approach and its C++ code are one click away.</p>
    </div>
    <div class="rail">${cards}</div>
  `;
}

function renderTopic(){
  const topic = TOPICS.find(t => t.id === state.topicId);
  const sections = topic.sections;
  const filters = ['All','Easy','Medium','Hard'];

  let body = '';
  if(sections.length === 0){
    body = `<div class="empty-state">No questions mapped for this topic yet.<br>Share the next set of screenshots and this section will fill in.</div>`;
  } else {
    let anyShown = false;
    sections.forEach(sec => {
      const qs = sec.questions.filter(q =>
        (state.filter === 'All' || q.difficulty === state.filter) &&
        q.name.toLowerCase().includes(state.query.toLowerCase())
      );
      if(qs.length === 0) return;
      anyShown = true;
      body += `<div class="section-title">${esc(sec.name)}</div>`;
      qs.forEach((q, qi) => {
        const key = sec.name + '::' + q.name;
        const isOpen = state.openQ === key;
        body += renderQuestion(q, key, isOpen);
      });
    });
    if(!anyShown) body = `<div class="no-results">No questions match your filters.</div>`;
  }

  return `
    <div class="subhead">
      <button class="back-btn" data-action="home">← All topics</button>
      <h2>${esc(topic.title)}</h2>
      <div class="controls">
        ${filters.map(f => `<button class="chip ${state.filter===f?'active':''}" data-filter="${f}">${f}</button>`).join('')}
        <input class="search" placeholder="Search this topic…" value="${esc(state.query)}" data-search>
      </div>
    </div>
    ${body}
  `;
}

function renderQuestion(q, key, isOpen){
  let inner = '';
  if(isOpen){
    const approaches = q.approaches;
    const activeIdx = state.tab[key] || 0;
    const active = approaches[activeIdx];
    let tabs = '';
    if(approaches.length > 1){
      tabs = `<div class="approach-tabs">` + approaches.map((a, i) => `
        <button class="a-tab ${i===activeIdx?'active':''}" data-tab="${key}::${i}">
          ${a.label.split('·')[0].trim()} <span class="tag">${esc(a.topic)}</span>
        </button>`).join('') + `</div>`;
    }
    inner = `
      <div class="q-body">
        ${tabs}
        <div class="code-wrap">
          <div class="code-topic">${approaches.length>1 ? esc(active.label) : `Optimal approach — filed under <b>${esc(active.topic)}</b>`}</div>
          <button class="copy-btn" data-copy="${key}::${activeIdx}">Copy</button>
          <pre class="code-block"><code>${highlightCpp(active.code)}</code></pre>
        </div>
      </div>`;
  }
  const lcTag = q.leetcode ? `<span class="lc-tag">LC ${q.leetcode}</span>` : '';
  return `
    <div class="q-row ${isOpen?'open':''}" data-q="${key}">
      <div class="q-head" data-toggle="${key}">
        ${diffBadge(q.difficulty)}
        <div class="q-name">${esc(q.name)}</div>
        ${lcTag}
        <div class="q-arrow">›</div>
      </div>
      ${inner}
    </div>`;
}

/* ======================= HANDLERS ======================= */
function attachHandlers(){
  document.querySelectorAll('[data-topic]').forEach(el => {
    el.onclick = () => {
      state.view = 'topic'; state.topicId = el.dataset.topic;
      state.filter = 'All'; state.query = ''; state.openQ = null; state.tab = {};
      render();
    };
  });
  document.querySelectorAll('[data-action="home"]').forEach(el => {
    el.onclick = () => { state.view = 'home'; render(); };
  });
  document.querySelectorAll('[data-filter]').forEach(el => {
    el.onclick = () => { state.filter = el.dataset.filter; render(); };
  });
  const searchEl = document.querySelector('[data-search]');
  if(searchEl){
    searchEl.oninput = (e) => { state.query = e.target.value; render(); searchEl.focus(); searchEl.setSelectionRange(state.query.length, state.query.length); };
  }
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.onclick = () => {
      const key = el.dataset.toggle;
      state.openQ = state.openQ === key ? null : key;
      render();
    };
  });
  document.querySelectorAll('[data-tab]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const full = el.dataset.tab;
      const cut = full.lastIndexOf('::');
      const fullKey = full.slice(0, cut);
      const idx = parseInt(full.slice(cut + 2));
      state.tab[fullKey] = idx;
      render();
    };
  });
  document.querySelectorAll('[data-copy]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const full = el.dataset.copy;
      const idx = parseInt(full.slice(full.lastIndexOf('::')+2));
      const key = full.slice(0, full.lastIndexOf('::'));
      const topic = TOPICS.find(t => t.id === state.topicId);
      let q = null;
      topic.sections.forEach(s => s.questions.forEach(qq => { if(s.name+'::'+qq.name === key) q = qq; }));
      if(q){
        navigator.clipboard.writeText(q.approaches[idx].code).then(() => {
          el.textContent = 'Copied';
          setTimeout(() => { el.textContent = 'Copy'; }, 1200);
        });
      }
    };
  });
}

render();
</script>
</body>
