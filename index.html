<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Sheet — Track & Solve</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0c0e;
    --panel:#141518;
    --panel-2:#1b1d21;
    --border:#2a2c31;
    --text:#eceae4;
    --text-dim:#96959c;
    --accent:#ff9d4d;
    --accent-dim:#8a5a33;
    --teal:#7dd3c0;
    --easy:#5fbf82;
    --medium:#e8b23d;
    --hard:#e2685f;
    --stl-seq:#57c7ff;
    --stl-adapt:#ffb454;
    --stl-set:#6fdc8c;
    --stl-map:#c792ea;
    --stl-algo:#ff6e87;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:'Space Grotesk',system-ui,sans-serif;}
  code,pre,.mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;}
  ::selection{background:var(--accent-dim);}

  #app{max-width:960px;margin:0 auto;padding:32px 20px 80px;}

  /* ---------- Header ---------- */
  .top{
    display:flex;align-items:baseline;justify-content:space-between;
    margin-bottom:36px;flex-wrap:wrap;gap:8px;
  }
  .top-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .stl-btn{
    display:inline-flex;align-items:center;gap:7px;
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    font-family:'Inter';font-size:12.5px;font-weight:500;
    padding:9px 14px;border-radius:20px;cursor:pointer;text-decoration:none;
    transition:border-color .15s ease, color .15s ease;flex-shrink:0;
  }
  .stl-btn:hover{border-color:var(--teal);color:var(--teal);}
  .stl-btn .glyph{
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
    color:var(--bg);background:var(--teal);border-radius:5px;padding:2px 6px;
  }
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand .mark{
    width:10px;height:10px;border-radius:2px;background:var(--accent);
    display:inline-block;transform:translateY(-2px);
  }
  .brand h1{font-size:22px;margin:0;font-weight:600;letter-spacing:-0.01em;}
  .top p{color:var(--text-dim);font-size:13px;margin:4px 0 0;}

  /* ---------- Home: topic rail ---------- */
  .rail{position:relative;padding-left:28px;}
  .rail::before{
    content:"";position:absolute;left:9px;top:14px;bottom:14px;width:1px;
    background:linear-gradient(var(--border), var(--border) 90%, transparent);
  }
  .topic-card{
    position:relative;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px 18px;
    margin-bottom:10px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    transition:border-color .15s ease, transform .15s ease;
  }
  .topic-card:hover{border-color:#3a3d44;transform:translateX(2px);}
  .topic-card::before{
    content:attr(data-idx);
    position:absolute;left:-28px;top:50%;transform:translateY(-50%);
    width:20px;height:20px;border-radius:50%;
    background:var(--bg);border:1px solid var(--border);
    font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);
    display:flex;align-items:center;justify-content:center;
  }
  .topic-card.has-data::before{border-color:var(--accent);color:var(--accent);}
  .topic-main .name{font-size:15px;font-weight:500;}
  .topic-main .meta{font-size:12px;color:var(--text-dim);margin-top:4px;}
  .topic-main .meta.ready{color:var(--teal);}
  .chev{color:var(--text-dim);font-size:18px;flex-shrink:0;}

  /* ---------- Topic view ---------- */
  .subhead{
    position:sticky;top:0;background:var(--bg);padding:10px 0 16px;z-index:5;
    border-bottom:1px solid var(--border);margin-bottom:20px;
  }
  .back-btn{
    background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;
    display:flex;align-items:center;gap:6px;padding:0;margin-bottom:10px;font-family:'Inter';
  }
  .back-btn:hover{color:var(--text);}
  .subhead h2{font-size:20px;margin:0 0 12px;font-weight:600;}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .chip{
    border:1px solid var(--border);background:var(--panel);color:var(--text-dim);
    font-size:12px;padding:6px 12px;border-radius:20px;cursor:pointer;
    font-family:'Inter';transition:all .15s ease;
  }
  .chip.active{border-color:var(--accent);color:var(--accent);background:rgba(255,157,77,.08);}
  .chip:hover:not(.active){border-color:#3a3d44;color:var(--text);}
  .search{
    margin-left:auto;background:var(--panel);border:1px solid var(--border);
    border-radius:20px;padding:6px 12px;font-size:12px;color:var(--text);
    min-width:180px;font-family:'Inter';
  }
  .search:focus{outline:none;border-color:var(--teal);}

  .section-title{
    font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);
    margin:26px 0 10px;font-weight:600;
  }
  .section-title:first-child{margin-top:0;}

  .q-row{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    margin-bottom:8px;overflow:hidden;
  }
  .q-head{
    display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;
  }
  .q-head:hover{background:var(--panel-2);}
  .q-name{flex:1;font-size:14px;}
  .badge{
    font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;
    text-transform:uppercase;letter-spacing:.03em;flex-shrink:0;
  }
  .lc-tag{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--teal);
    background:rgba(125,211,192,.1);border:1px solid rgba(125,211,192,.25);
    padding:2px 7px;border-radius:5px;flex-shrink:0;white-space:nowrap;
  }
  .badge-easy{color:var(--easy);background:rgba(95,191,130,.12);}
  .badge-medium{color:var(--medium);background:rgba(232,178,61,.12);}
  .badge-hard{color:var(--hard);background:rgba(226,104,95,.12);}
  .q-arrow{color:var(--text-dim);font-size:12px;transition:transform .15s ease;flex-shrink:0;}
  .q-row.open .q-arrow{transform:rotate(90deg);}

  .q-body{border-top:1px solid var(--border);padding:16px;display:none;}
  .q-row.open .q-body{display:block;}

  .approach-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .a-tab{
    border:1px solid var(--border);background:var(--bg);color:var(--text-dim);
    font-size:11.5px;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:'Inter';
  }
  .a-tab.active{border-color:var(--accent);color:var(--accent);}
  .a-tab .tag{color:var(--teal);font-family:'JetBrains Mono';font-size:10.5px;}
  .a-tab.active .tag{color:var(--accent);}

  .code-wrap{position:relative;}
  .code-topic{font-size:11px;color:var(--text-dim);margin-bottom:6px;}
  .code-topic b{color:var(--teal);font-weight:500;}
  pre.code-block{
    background:#0e0f11;border:1px solid var(--border);border-radius:8px;
    padding:14px 16px;overflow-x:auto;font-size:12.5px;line-height:1.6;margin:0;
  }
  .copy-btn{
    position:absolute;top:10px;right:10px;background:var(--panel-2);border:1px solid var(--border);
    color:var(--text-dim);font-size:10.5px;padding:4px 9px;border-radius:5px;cursor:pointer;font-family:'Inter';
  }
  .copy-btn:hover{color:var(--text);}
  .note{font-size:12px;color:var(--text-dim);margin-top:10px;}

  .kw{color:#c586c0;} .tp{color:#4ec9b0;} .str{color:#ce9178;} .num{color:#b5cea8;} .cm{color:#6a9955;} .fn{color:#dcdcaa;}

  .empty-state{
    border:1px dashed var(--border);border-radius:var(--radius);padding:30px 20px;
    text-align:center;color:var(--text-dim);font-size:13px;
  }
  .no-results{color:var(--text-dim);font-size:13px;padding:20px 0;}

  /* ---------- STL Revision page ---------- */
  .stl-legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:22px;}
  .stl-legend span{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-dim);}
  .stl-legend i{width:8px;height:8px;border-radius:2px;display:inline-block;}

  .stl-progress-wrap{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
  .stl-progress-label{font-size:12px;color:var(--text-dim);white-space:nowrap;}
  .stl-progress-track{flex:1;height:6px;border-radius:6px;background:var(--panel);border:1px solid var(--border);overflow:hidden;}
  .stl-progress-fill{height:100%;background:linear-gradient(90deg,var(--stl-seq),var(--stl-set));width:0%;transition:width .3s ease;}

  .stl-section{margin-bottom:28px;}
  .stl-section-head{display:flex;align-items:center;gap:9px;margin-bottom:12px;}
  .stl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .stl-section-head h3{font-size:15px;margin:0;font-weight:600;}
  .stl-section-head .tagline{font-size:11.5px;color:var(--text-dim);}

  .stl-sub{margin-bottom:14px;}
  .stl-sub-head{
    display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;
    color:var(--text-dim);margin:0 0 6px 2px;text-transform:uppercase;letter-spacing:.03em;
  }
  .stl-sub-head b{color:var(--text);text-transform:none;letter-spacing:0;font-size:13.5px;}
  .stl-tag{
    font-size:10px;padding:2px 7px;border-radius:5px;background:var(--panel-2);
    color:var(--text-dim);border:1px solid var(--border);text-transform:none;font-weight:500;
  }
  .stl-done{
    font-size:9.5px;color:var(--easy);border:1px solid var(--easy);padding:1px 6px;
    border-radius:20px;text-transform:none;font-weight:500;
  }

  .stl-row{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    margin-bottom:8px;overflow:hidden;
  }
  .stl-row-head{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;}
  .stl-row-head:hover{background:var(--panel-2);}
  .stl-check{
    flex-shrink:0;width:17px;height:17px;border-radius:5px;border:1.5px solid var(--text-dim);
    display:flex;align-items:center;justify-content:center;transition:all .15s ease;
  }
  .stl-row.checked .stl-check{background:var(--easy);border-color:var(--easy);}
  .stl-row.checked .stl-term{opacity:.55;text-decoration:line-through;text-decoration-color:var(--text-dim);}
  .stl-term{flex:1;font-size:14px;}
  .stl-term b{font-weight:600;}
  .stl-flag{font-size:10.5px;color:var(--medium);flex-shrink:0;}

  .stl-body{border-top:1px solid var(--border);padding:16px;display:none;}
  .stl-row.open .stl-body{display:block;}
  .stl-row.open .q-arrow{transform:rotate(90deg);}
  .stl-expl{font-size:13px;color:var(--text-dim);margin:0 0 12px;line-height:1.55;}
  .stl-expl b{color:var(--text);font-weight:600;}
  .stl-out{font-size:12px;color:var(--teal);margin-top:8px;}
  .stl-out b{color:var(--teal);}


  @media (max-width:560px){
    .search{margin-left:0;width:100%;}
    .subhead h2{font-size:18px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ======================= DATA ======================= */
/* Each question: { name, difficulty: 'Easy'|'Medium'|'Hard', approaches: [ {label, topic, code} ] }
   If approaches.length === 1, the optimal approach IS the under-topic approach — only one panel is shown.
   If approaches.length === 2, approaches[0] is the optimal (interview-preferred) one. */

const TOPICS = [
  {
    id:'sorting', title:'Learn Important Sorting Techniques', total:7,
    sections:[
      { name:'Sorting-I', questions:[
        { name:'Selection Sort', difficulty:'Easy', approaches:[
          { label:'Optimal · Sorting', topic:'Sorting', code:
`void selectionSort(vector<int>& arr){
    int n = arr.size();
    for(int i = 0; i < n - 1; i++){
        int minIdx = i;
        for(int j = i + 1; j < n; j++)
            if(arr[j] < arr[minIdx]) minIdx = j;
        swap(arr[i], arr[minIdx]);
    }
}
// Time: O(n^2)   Space: O(1)` } ] },
        { name:'Bubble Sort', difficulty:'Easy', approaches:[
          { label:'Optimal · Sorting', topic:'Sorting', code:
`void bubbleSort(vector<int>& arr){
    int n = arr.size();
    for(int i = 0; i < n - 1; i++){
        bool swapped = false;
        for(int j = 0; j < n - 1 - i; j++){
            if(arr[j] > arr[j + 1]){
                swap(arr[j], arr[j + 1]);
                swapped = true;
            }
        }
        if(!swapped) break; // already sorted
    }
}
// Time: O(n^2) worst, O(n) best   Space: O(1)` } ] },
        { name:'Insertion Sort', difficulty:'Easy', approaches:[
          { label:'Optimal · Sorting', topic:'Sorting', code:
`void insertionSort(vector<int>& arr){
    int n = arr.size();
    for(int i = 1; i < n; i++){
        int key = arr[i], j = i - 1;
        while(j >= 0 && arr[j] > key){
            arr[j + 1] = arr[j];
            j--;
        }
        arr[j + 1] = key;
    }
}
// Time: O(n^2)   Space: O(1)` } ] },
      ]},
      { name:'Sorting-II', questions:[
        { name:'Merge Sorting', difficulty:'Medium', leetcode:912, approaches:[
          { label:'Optimal · Sorting (Divide & Conquer)', topic:'Sorting', code:
`void merge(vector<int>& arr, int l, int m, int r){
    vector<int> temp;
    int i = l, j = m + 1;
    while(i <= m && j <= r){
        if(arr[i] <= arr[j]) temp.push_back(arr[i++]);
        else temp.push_back(arr[j++]);
    }
    while(i <= m) temp.push_back(arr[i++]);
    while(j <= r) temp.push_back(arr[j++]);
    for(int k = l; k <= r; k++) arr[k] = temp[k - l];
}
void mergeSort(vector<int>& arr, int l, int r){
    if(l >= r) return;
    int m = (l + r) / 2;
    mergeSort(arr, l, m);
    mergeSort(arr, m + 1, r);
    merge(arr, l, m, r);
}
// Time: O(n log n)   Space: O(n)` } ] },
        { name:'Recursive Bubble Sort', difficulty:'Easy', approaches:[
          { label:'Optimal · Sorting (Recursion)', topic:'Sorting', code:
`void recursiveBubbleSort(vector<int>& arr, int n){
    if(n == 1) return;
    for(int i = 0; i < n - 1; i++)
        if(arr[i] > arr[i + 1]) swap(arr[i], arr[i + 1]);
    recursiveBubbleSort(arr, n - 1);
}
// Time: O(n^2)   Space: O(n) recursion stack` } ] },
        { name:'Recursive Insertion Sort', difficulty:'Easy', approaches:[
          { label:'Optimal · Sorting (Recursion)', topic:'Sorting', code:
`void recInsertionSort(vector<int>& arr, int n){
    if(n <= 1) return;
    recInsertionSort(arr, n - 1);
    int last = arr[n - 1], j = n - 2;
    while(j >= 0 && arr[j] > last){
        arr[j + 1] = arr[j];
        j--;
    }
    arr[j + 1] = last;
}
// Time: O(n^2)   Space: O(n) recursion stack` } ] },
        { name:'Quick Sorting', difficulty:'Easy', leetcode:912, approaches:[
          { label:'Optimal · Sorting (Divide & Conquer)', topic:'Sorting', code:
`int partition(vector<int>& arr, int low, int high){
    int pivot = arr[high], i = low - 1;
    for(int j = low; j < high; j++)
        if(arr[j] < pivot) swap(arr[++i], arr[j]);
    swap(arr[i + 1], arr[high]);
    return i + 1;
}
void quickSort(vector<int>& arr, int low, int high){
    if(low < high){
        int pi = partition(arr, low, high);
        quickSort(arr, low, pi - 1);
        quickSort(arr, pi + 1, high);
    }
}
// Time: O(n log n) avg, O(n^2) worst   Space: O(log n)` } ] },
      ]},
    ]
  },
  {
    id:'arrays', title:'Solve Problems on Arrays [Easy -> Medium -> Hard]', total:40,
    sections:[
      { name:'Easy', questions:[
        { name:'Largest Element', difficulty:'Easy', approaches:[
          { label:'Optimal · Linear Scan', topic:'Arrays', code:
`int largestElement(vector<int>& arr){
    int maxVal = arr[0];
    for(int x : arr) maxVal = max(maxVal, x);
    return maxVal;
}
// Time: O(n)   Space: O(1)` } ] },
        { name:'Second Largest Element', difficulty:'Easy', approaches:[
          { label:'Optimal · Single Pass', topic:'Arrays', code:
`int secondLargest(vector<int>& arr){
    int largest = INT_MIN, second = INT_MIN;
    for(int x : arr){
        if(x > largest){ second = largest; largest = x; }
        else if(x > second && x != largest) second = x;
    }
    return second; // INT_MIN if it doesn't exist
}
// Time: O(n)   Space: O(1)   (no sorting needed)` } ] },
        { name:'Check if the Array is Sorted II', difficulty:'Easy', leetcode:1752, approaches:[
          { label:'Optimal · Single Pass (break-point count)', topic:'Arrays', code:
`bool checkSortedAndRotated(vector<int>& arr){
    int n = arr.size(), breaks = 0;
    for(int i = 0; i < n; i++){
        if(arr[i] > arr[(i + 1) % n]) breaks++;
        if(breaks > 1) return false;
    }
    return true;
}
// Time: O(n)   Space: O(1)` } ] },
        { name:'Remove duplicates from Sorted array', difficulty:'Easy', leetcode:26, approaches:[
          { label:'Optimal · Two Pointer (in-place)', topic:'Arrays', code:
`int removeDuplicates(vector<int>& arr){
    int n = arr.size();
    if(n == 0) return 0;
    int i = 0;
    for(int j = 1; j < n; j++){
        if(arr[j] != arr[i]){
            i++;
            arr[i] = arr[j];
        }
    }
    return i + 1; // new length
}
// Time: O(n)   Space: O(1)` } ] },
        { name:'Left Rotate Array by One', difficulty:'Easy', approaches:[
          { label:'Optimal · Shift + Wrap', topic:'Arrays', code:
`void rotateByOne(vector<int>& arr){
    int n = arr.size();
    int temp = arr[0];
    for(int i = 1; i < n; i++) arr[i - 1] = arr[i];
    arr[n - 1] = temp;
}
// Time: O(n)   Space: O(1)` } ] },
        { name:'Left Rotate Array by K Places', difficulty:'Easy', leetcode:189, approaches:[
          { label:'Optimal · Reversal Algorithm', topic:'Arrays', code:
`void rotateByK(vector<int>& arr, int k){
    int n = arr.size();
    k = k % n;
    reverse(arr.begin(), arr.begin() + k);
    reverse(arr.begin() + k, arr.end());
    reverse(arr.begin(), arr.end());
}
// Time: O(n)   Space: O(1)` } ] },
        { name:'Move Zeros to End', difficulty:'Easy', leetcode:283, approaches:[
          { label:'Optimal · Two Pointer (in-place)', topic:'Arrays', code:
`void moveZeroes(vector<int>& arr){
    int n = arr.size(), j = -1;
    for(int i = 0; i < n; i++) if(arr[i] == 0){ j = i; break; }
    if(j == -1) return; // no zero present
    for(int i = j + 1; i < n; i++)
        if(arr[i] != 0) swap(arr[i], arr[j++]);
}
// Time: O(n)   Space: O(1)` } ] },
        { name:'Linear Search', difficulty:'Easy', approaches:[
          { label:'Optimal · Linear Scan', topic:'Arrays', code:
`int linearSearch(vector<int>& arr, int target){
    for(int i = 0; i < (int)arr.size(); i++)
        if(arr[i] == target) return i;
    return -1;
}
// Time: O(n)   Space: O(1)` } ] },
        { name:'Union of two sorted arrays', difficulty:'Easy', approaches:[
          { label:'Optimal · Two Pointer Merge', topic:'Arrays', code:
`vector<int> findUnion(vector<int>& a, vector<int>& b){
    int i = 0, j = 0; vector<int> res;
    while(i < (int)a.size() && j < (int)b.size()){
        int val = (a[i] <= b[j]) ? a[i] : b[j];
        if(res.empty() || res.back() != val) res.push_back(val);
        if(a[i] <= b[j]) i++; else j++;
    }
    while(i < (int)a.size()){ if(res.empty() || res.back() != a[i]) res.push_back(a[i]); i++; }
    while(j < (int)b.size()){ if(res.empty() || res.back() != b[j]) res.push_back(b[j]); j++; }
    return res;
}
// Time: O(n + m)   Space: O(n + m) for the output` } ] },
        { name:'Find missing number', difficulty:'Easy', leetcode:268, approaches:[
          { label:'Optimal · Sum Formula', topic:'Arrays', code:
`int missingNumber(vector<int>& arr, int n){
    long long expected = (long long)n * (n + 1) / 2;
    long long actual = 0;
    for(int x : arr) actual += x;
    return (int)(expected - actual);
}
// Time: O(n)   Space: O(1)` },
          { label:'Brute Force · Hashing', topic:'Arrays', code:
`int missingNumberBrute(vector<int>& arr, int n){
    vector<int> seen(n + 1, 0);
    for(int x : arr) seen[x] = 1;
    for(int i = 0; i <= n; i++) if(!seen[i]) return i;
    return -1;
}
// Time: O(n)   Space: O(n)  — optimal avoids the extra array` } ] },
        { name:'Maximum Consecutive Ones', difficulty:'Easy', leetcode:485, approaches:[
          { label:'Optimal · Single Pass', topic:'Arrays', code:
`int findMaxConsecutiveOnes(vector<int>& arr){

`class LRUCache {
    int capacity;
    list<pair<int,int>> order; // {key, value}, front = most recently used
    unordered_map<int, list<pair<int,int>>::iterator> mp;
public:
    LRUCache(int cap) : capacity(cap) {}
    int get(int key){
        if(mp.find(key) == mp.end()) return -1;
        auto it = mp[key];
        int val = it->second;
        order.erase(it);
        order.push_front({key, val});
        mp[key] = order.begin();
        return val;
    }
    void put(int key, int value){
        if(mp.find(key) != mp.end()) order.erase(mp[key]);
        else if((int)order.size() == capacity){
            auto last = order.back();
            mp.erase(last.first);
            order.pop_back();
        }
        order.push_front({key, value});
        mp[key] = order.begin();
    }
};

`string minWindow(string s, string t){
    int n = s.size(), m = t.size();
    int bestLen = INT_MAX, bestStart = -1;
    int i = 0;
    while(i < n){
        int j = 0, start = i;
        while(i < n){                  // expand until t is fully matched
            if(s[i] == t[j]){ j++; if(j == m) break; }
            i++;
        }
        if(j < m) break;               // t can't be matched again, stop
        int end = i;
        j = m - 1;
        while(i >= start){             // contract from the match backward
            if(s[i] == t[j]){ j--; if(j < 0) break; }
            i--;
        }
        i++;                           // i is now the start of this valid window
        if(end - i + 1 < bestLen){ bestLen = end - i + 1; bestStart = i; }
        i++;                           // move on to search for the next window
    }
    return bestStart == -1 ? "" : s.substr(bestStart, bestLen);
}

`int widthOfBinaryTree(TreeNode* root){
    if(!root) return 0;
    long long maxWidth = 0;
    queue<pair<TreeNode*, long long>> q;
    q.push({root, 0});
    while(!q.empty()){
        int sz = q.size();
        long long minIdx = q.front().second, first = 0, last = 0;
        for(int i = 0; i < sz; i++){
            auto [node, idx] = q.front(); q.pop();
            long long normIdx = idx - minIdx; // re-base to avoid overflow
            if(i == 0) first = normIdx;
            if(i == sz - 1) last = normIdx;
            if(node->left) q.push({node->left, 2 * normIdx});
            if(node->right) q.push({node->right, 2 * normIdx + 1});
        }
        maxWidth = max(maxWidth, last - first + 1);
    }
    return (int)maxWidth;
}

`class DisjointSet {
    vector<int> parent, rank_;
public:
    DisjointSet(int n){
        parent.resize(n);
        rank_.assign(n, 0);
        for(int i = 0; i < n; i++) parent[i] = i;
    }
    int findParent(int node){
        if(parent[node] == node) return node;
        return parent[node] = findParent(parent[node]); // path compression
    }
    void unionSets(int u, int v){
        int pu = findParent(u), pv = findParent(v);
        if(pu == pv) return;
        if(rank_[pu] < rank_[pv]) swap(pu, pv);
        parent[pv] = pu;
        if(rank_[pu] == rank_[pv]) rank_[pu]++;
    }
};

`int removeStones(vector<vector<int>>& stones){
    unordered_map<int,int> parent;
    function<int(int)> find = [&](int x) -> int {

    auto unite = [&](int x, int y){ parent[find(x)] = find(y); };

int kosarajuSCC(int n, vector<vector<int>>& adj){
    vector<bool> visited(n, false);
    stack<int> st;
    for(int i = 0; i < n; i++)
        if(!visited[i]) dfsFinish(i, adj, visited, st);
    vector<vector<int>> adjT(n);
    for(int u = 0; u < n; u++)
        for(int v : adj[u]) adjT[v].push_back(u); // reverse every edge
    fill(visited.begin(), visited.end(), false);
    int sccCount = 0;
    while(!st.empty()){
        int node = st.top(); st.pop();
        if(!visited[node]){
            vector<int> component;
            dfsCollect(node, adjT, visited, component);
            sccCount++;
        }
    }
    return sccCount;
}

s.insert(10);
s.insert(20);

s.erase(20);`, out:'10 30' },

auto it = s.lower_bound(20);
cout << *it;`, out:'20' },

cout << *it;`, out:'30' }

    { name:'multiset', items:[
      { id:'ms-1', term:'insert', expl:'Just like set, but multiset allows duplicate values and keeps everything in sorted order.',
        code:`multiset<int> ms;
ms.insert(10); ms.insert(20); ms.insert(20);`, out:'10 20 20' },
      { id:'ms-2', term:'erase', expl:'Removing by value takes out ALL occurrences of that value by default.',
        code:`multiset<int> ms = {10, 20, 20};
ms.erase(20);`, out:'10' }

    { name:'unordered_set', items:[

      { id:'m-2', term:'find', expl:'Looks up a key and returns an iterator to its pair, or end() if the key is missing — average O(log n).',
        code:`auto it = m.find(2);
if (it != m.end()) cout << it->second;`, out:'two' },
      { id:'m-3', term:'empty', expl:'True if the map has no entries at all.',

cout << (m.empty() ? "Empty" : "Not Empty");`, out:'Empty' },

cout << it->first << ": " << it->second;`, out:'2: two' },

      { id:'mm-1', term:'equal_range', expl:'Returns a pair of iterators bracketing every entry that shares the given key — useful since multimap allows duplicate keys.',

    cout << it->second << " ";`, out:'one uno' }

        code:`vector<int> v = {1,2,3};
next_permutation(v.begin(), v.end());`, out:'1 3 2' },

/* ======================= STATE ======================= */
let state = { view:'home', topicId:null, filter:'All', query:'', openQ:null, tab:{},
  stl:{ query:'', openItems:new Set(), checked:{} } };

/* ======================= HELPERS ======================= */
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function highlightCpp(code){
  let html = esc(code);
  html = html.replace(/(\/\/.*$)/gm, '§CM§$1§\/CM§');
  html = html.replace(/("(?:[^"\\]|\\.)*")/g, '§STR§$1§\/STR§');
  html = html.replace(/('(?:[^'\\]|\\.)*')/g, '§STR§$1§\/STR§');
  const kw = ['if','else','for','while','return','break','continue','struct','class','void','true','false','const','static','function','new'];
  const tp = ['int','long','double','float','bool','char','string','auto','vector','stack','queue','unordered_map','unordered_set','map','set','pair'];
  html = html.replace(/\b([A-Za-z_]\w*)\b/g, (m)=>{
    if(kw.includes(m)) return '§KW§'+m+'§\/KW§';
    if(tp.includes(m)) return '§TP§'+m+'§\/TP§';
    return m;
  });
  html = html.replace(/\b(\d+)\b/g, '§NUM§$1§\/NUM§');
  html = html
    .replace(/§CM§/g,'<span class="cm">').replace(/§\/CM§/g,'</span>')
    .replace(/§STR§/g,'<span class="str">').replace(/§\/STR§/g,'</span>')
    .replace(/§KW§/g,'<span class="kw">').replace(/§\/KW§/g,'</span>')
    .replace(/§TP§/g,'<span class="tp">').replace(/§\/TP§/g,'</span>')
    .replace(/§NUM§/g,'<span class="num">').replace(/§\/NUM§/g,'</span>');
  return html;
}

function diffBadge(d){
  const cls = d === 'Easy' ? 'badge-easy' : d === 'Medium' ? 'badge-medium' : 'badge-hard';
  return `<span class="badge ${cls}">${d}</span>`;
}

function countAll(topic){
  let n = 0;
  topic.sections.forEach(s => n += s.questions.length);
  return n;
}

/* ======================= RENDER ======================= */
function render(){
  const app = document.getElementById('app');
  if(state.view === 'home') app.innerHTML = renderHome();
  else if(state.view === 'stl') app.innerHTML = renderSTL();
  else app.innerHTML = renderTopic();
  attachHandlers();
}

function renderHome(){
  const cards = TOPICS.map((t, i) => {
    const mapped = countAll(t);
    const hasData = mapped > 0;
    const meta = hasData
      ? `${mapped} of ${t.total} problems mapped with C++ solutions`
      : `${t.total} problems in this topic — not added yet`;
    return `
      <div class="topic-card ${hasData ? 'has-data' : ''}" data-idx="${String(i+1).padStart(2,'0')}" data-topic="${t.id}">
        <div class="topic-main">
          <div class="name">${esc(t.title)}</div>
          <div class="meta ${hasData ? 'ready' : ''}">${meta}</div>
        </div>
        <div class="chev">→</div>
      </div>`;
  }).join('');

  return `
    <div class="top">
      <div class="brand"><span class="mark"></span><h1>DSA Sheet</h1></div>
      <div class="top-right">
        <p style="margin:0;">Pick a topic, then a question — the optimal interview approach and its C++ code are one click away.</p>
        <button class="stl-btn" data-action="stl">
          <span class="glyph">std::</span> C++ STL Revision
        </button>
      </div>
    </div>
    <div class="rail">${cards}</div>
  `;
}

function renderTopic(){
  const topic = TOPICS.find(t => t.id === state.topicId);
  const sections = topic.sections;
  const filters = ['All','Easy','Medium','Hard'];

  let body = '';
  if(sections.length === 0){
    body = `<div class="empty-state">No questions mapped for this topic yet.<br>Share the next set of screenshots and this section will fill in.</div>`;
  } else {
    let anyShown = false;
    sections.forEach(sec => {
      const qs = sec.questions.filter(q =>
        (state.filter === 'All' || q.difficulty === state.filter) &&
        q.name.toLowerCase().includes(state.query.toLowerCase())
      );
      if(qs.length === 0) return;
      anyShown = true;
      body += `<div class="section-title">${esc(sec.name)}</div>`;
      qs.forEach((q, qi) => {
        const key = sec.name + '::' + q.name;
        const isOpen = state.openQ === key;
        body += renderQuestion(q, key, isOpen);
      });
    });
    if(!anyShown) body = `<div class="no-results">No questions match your filters.</div>`;
  }

  return `
    <div class="subhead">
      <button class="back-btn" data-action="home">← All topics</button>
      <h2>${esc(topic.title)}</h2>
      <div class="controls">
        ${filters.map(f => `<button class="chip ${state.filter===f?'active':''}" data-filter="${f}">${f}</button>`).join('')}
        <input class="search" placeholder="Search this topic…" value="${esc(state.query)}" data-search>
      </div>
    </div>
    ${body}
  `;
}

function renderQuestion(q, key, isOpen){
  let inner = '';
  if(isOpen){
    const approaches = q.approaches;
    const activeIdx = state.tab[key] || 0;
    const active = approaches[activeIdx];
    let tabs = '';
    if(approaches.length > 1){
      tabs = `<div class="approach-tabs">` + approaches.map((a, i) => `
        <button class="a-tab ${i===activeIdx?'active':''}" data-tab="${key}::${i}">
          ${a.label.split('·')[0].trim()} <span class="tag">${esc(a.topic)}</span>
        </button>`).join('') + `</div>`;
    }
    inner = `
      <div class="q-body">
        ${tabs}
        <div class="code-wrap">
          <div class="code-topic">${approaches.length>1 ? esc(active.label) : `Optimal approach — filed under <b>${esc(active.topic)}</b>`}</div>
          <button class="copy-btn" data-copy="${key}::${activeIdx}">Copy</button>
          <pre class="code-block"><code>${highlightCpp(active.code)}</code></pre>
        </div>
      </div>`;
  }
  const lcTag = q.leetcode ? `<span class="lc-tag">LC ${q.leetcode}</span>` : '';
  return `
    <div class="q-row ${isOpen?'open':''}" data-q="${key}">
      <div class="q-head" data-toggle="${key}">
        ${diffBadge(q.difficulty)}
        <div class="q-name">${esc(q.name)}</div>
        ${lcTag}
        <div class="q-arrow">›</div>
      </div>
      ${inner}
    </div>`;
}

function renderSTLItem(item, subName){
  const key = item.id;
  const isOpen = state.stl.openItems.has(key);
  const isChecked = !!state.stl.checked[key];
  let body = '';
  if(isOpen){
    body = `
      <div class="stl-body">
        ${item.flag ? `<div class="code-topic" style="color:var(--medium);">⚑ ${esc(item.flag)}</div>` : ''}
        <p class="stl-expl">${esc(item.expl)}</p>
        ${item.code ? `
        <div class="code-wrap">
          <button class="copy-btn" data-stl-copy="${key}">Copy</button>
          <pre class="code-block"><code>${highlightCpp(item.code)}</code></pre>
        </div>` : ''}
        ${item.out ? `<div class="stl-out"><b>Output:</b> ${esc(item.out)}</div>` : ''}
      </div>`;
  }
  return `
    <div class="stl-row ${isOpen?'open':''} ${isChecked?'checked':''}" data-stl-item="${key}">
      <div class="stl-row-head" data-stl-toggle="${key}">
        <div class="stl-check" data-stl-check="${key}">${isChecked ? '✓' : ''}</div>
        <div class="stl-term">${esc(item.term)}</div>
        ${item.flag ? `<span class="stl-flag">⚑</span>` : ''}
        <div class="q-arrow">›</div>
      </div>
      ${body}
    </div>`;
}

function renderSTL(){
  const query = state.stl.query.toLowerCase();

  let totalItems = 0, doneItems = 0;
  STL_DATA.forEach(sec => sec.subs.forEach(sub => sub.items.forEach(it => {
    totalItems++;
    if(state.stl.checked[it.id]) doneItems++;
  })));

  let anySectionShown = false;
  const sectionsHtml = STL_DATA.map(sec => {
    let anySubShown = false;
    const subsHtml = sec.subs.map(sub => {
      const items = sub.items.filter(it =>
        !query || it.term.toLowerCase().includes(query) || it.expl.toLowerCase().includes(query)
      );
      if(items.length === 0) return '';
      anySubShown = true;
      const head = sub.name ? `
        <div class="stl-sub-head">
          <b>${esc(sub.name)}</b>
          ${sub.tag ? `<span class="stl-tag">${esc(sub.tag)}</span>` : ''}
          ${sub.done ? `<span class="stl-done">done</span>` : ''}
        </div>` : '';
      return `<div class="stl-sub">${head}${items.map(it => renderSTLItem(it, sub.name)).join('')}</div>`;
    }).join('');
    if(!anySubShown) return '';
    anySectionShown = true;
    return `
      <div class="stl-section">
        <div class="stl-section-head">
          <span class="stl-dot" style="background:var(--${sec.color})"></span>
          <h3>${esc(sec.title)}</h3>
          <span class="tagline">${esc(sec.tagline)}</span>
        </div>
        ${subsHtml}
      </div>`;
  }).join('');

  const body = anySectionShown ? sectionsHtml : `<div class="no-results">No terms match your search.</div>`;

  return `
    <div class="subhead">
      <button class="back-btn" data-action="home">← All topics</button>
      <h2>C++ STL — Revision Map</h2>
      <div class="controls">
        <button class="chip" data-stl-expand-all>Expand all</button>
        <button class="chip" data-stl-collapse-all>Collapse all</button>
        <button class="chip" data-stl-reset>Reset ticks</button>
        <input class="search" placeholder="Search a method… e.g. lower_bound" value="${esc(state.stl.query)}" data-stl-search>
      </div>
    </div>
    <div class="stl-progress-wrap">
      <span class="stl-progress-label">${doneItems} / ${totalItems} revised</span>
      <div class="stl-progress-track"><div class="stl-progress-fill" style="width:${totalItems ? (doneItems/totalItems*100) : 0}%"></div></div>
    </div>
    <div class="stl-legend">
      <span><i style="background:var(--stl-seq)"></i>sequence</span>
      <span><i style="background:var(--stl-adapt)"></i>adapters</span>
      <span><i style="background:var(--stl-set)"></i>set family</span>
      <span><i style="background:var(--stl-map)"></i>map family</span>
      <span><i style="background:var(--stl-algo)"></i>algorithms</span>
    </div>
    ${body}
  `;
}

/* ======================= HANDLERS ======================= */
function attachHandlers(){
  document.querySelectorAll('[data-topic]').forEach(el => {
    el.onclick = () => {
      state.view = 'topic'; state.topicId = el.dataset.topic;
      state.filter = 'All'; state.query = ''; state.openQ = null; state.tab = {};
      render();
    };
  });
  document.querySelectorAll('[data-action="home"]').forEach(el => {
    el.onclick = () => { state.view = 'home'; render(); };
  });
  document.querySelectorAll('[data-action="stl"]').forEach(el => {
    el.onclick = () => { state.view = 'stl'; render(); };
  });
  document.querySelectorAll('[data-filter]').forEach(el => {
    el.onclick = () => { state.filter = el.dataset.filter; render(); };
  });
  const searchEl = document.querySelector('[data-search]');
  if(searchEl){
    searchEl.oninput = (e) => { state.query = e.target.value; render(); searchEl.focus(); searchEl.setSelectionRange(state.query.length, state.query.length); };
  }
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.onclick = () => {
      const key = el.dataset.toggle;
      state.openQ = state.openQ === key ? null : key;
      render();
    };
  });
  document.querySelectorAll('[data-tab]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const full = el.dataset.tab;
      const cut = full.lastIndexOf('::');
      const fullKey = full.slice(0, cut);
      const idx = parseInt(full.slice(cut + 2));
      state.tab[fullKey] = idx;
      render();
    };
  });
  document.querySelectorAll('[data-copy]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const full = el.dataset.copy;
      const idx = parseInt(full.slice(full.lastIndexOf('::')+2));
      const key = full.slice(0, full.lastIndexOf('::'));
      const topic = TOPICS.find(t => t.id === state.topicId);
      let q = null;
      topic.sections.forEach(s => s.questions.forEach(qq => { if(s.name+'::'+qq.name === key) q = qq; }));
      if(q){
        navigator.clipboard.writeText(q.approaches[idx].code).then(() => {
          el.textContent = 'Copied';
          setTimeout(() => { el.textContent = 'Copy'; }, 1200);
        });
      }
    };
  });

  /* ---- STL revision page handlers ---- */
  document.querySelectorAll('[data-stl-toggle]').forEach(el => {
    el.onclick = () => {
      const key = el.dataset.stlToggle;
      if(state.stl.openItems.has(key)) state.stl.openItems.delete(key);
      else state.stl.openItems.add(key);
      render();
    };
  });
  document.querySelectorAll('[data-stl-check]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const key = el.dataset.stlCheck;
      state.stl.checked[key] = !state.stl.checked[key];
      render();
    };
  });
  const stlSearchEl = document.querySelector('[data-stl-search]');
  if(stlSearchEl){
    stlSearchEl.oninput = (e) => {
      state.stl.query = e.target.value;
      render();
      const el2 = document.querySelector('[data-stl-search]');
      if(el2){ el2.focus(); el2.setSelectionRange(state.stl.query.length, state.stl.query.length); }
    };
  }
  const stlExpandAll = document.querySelector('[data-stl-expand-all]');
  if(stlExpandAll){
    stlExpandAll.onclick = () => {
      STL_DATA.forEach(sec => sec.subs.forEach(sub => sub.items.forEach(it => state.stl.openItems.add(it.id))));
      render();
    };
  }
  const stlCollapseAll = document.querySelector('[data-stl-collapse-all]');
  if(stlCollapseAll){
    stlCollapseAll.onclick = () => { state.stl.openItems.clear(); render(); };
  }
  const stlReset = document.querySelector('[data-stl-reset]');
  if(stlReset){
    stlReset.onclick = () => { state.stl.checked = {}; render(); };
  }
  document.querySelectorAll('[data-stl-copy]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const key = el.dataset.stlCopy;
      let code = '';
      STL_DATA.forEach(sec => sec.subs.forEach(sub => sub.items.forEach(it => { if(it.id === key) code = it.code; })));
      navigator.clipboard.writeText(code).then(() => {
        el.textContent = 'Copied';
        setTimeout(() => { el.textContent = 'Copy'; }, 1200);
      });
    };
  });
}

render();
